<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>travel-guide</title>
  </head>
  <body>
    <div id="app">
      <section
        id="center"
        class="min-h-screen flex items-center justify-center bg-surface-soft px-6 py-12 text-primary"
      >
        <div
          class="w-full max-w-3xl space-y-10 rounde-[2rem] border border-border bg-white p-8 shadow-[0_25px_60px_-25px_rgba(76,61,25,0.15)] sm:p-10"
        >
          <div
            id="img-container"
            class="min-h-[18rem] rounded-[1.75rem] bg-surface shadow-inner"
          ></div>
          <div
            id="facts-output"
            class="space-y-2 text-sm font-medium text-secondary"
          ></div>
          <div class="space-y-3 text-center">
            <h1
              class="text-4xl font-semibold tracking-tight text-primary sm:text-5xl"
            >
              Your visit starts here
            </h1>
          </div>
          <form action="" method="get" class="grid gap-6">
            <div class="space-y-2 text-left">
              <label
                for="city-input"
                class="block text-sm font-semibold text-secondary"
                >Enter your destination</label
              >
              <input
                id="city-input"
                name="city-input"
                type="text"
                required
                placeholder="e.g., Philadelphia"
                class="block w-full rounded-[1.75rem] border border-accent bg-page px-5 py-4 text-base text-primary shadow-sm input-shadow placeholder-custom transition duration-200 ease-out focus:border-secondary focus:outline-none focus-ring-accent"
              />
            </div>
            <button
              id="search-btn"
              type="submit"
              class="inline-flex w-full items-center justify-center gap-2 rounded-[1.75rem] btn-gradient px-6 py-4 text-base font-semibold btn-text-inverse btn-shadow transition duration-200 hover:scale-[1.01] btn-hover-gradient focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-secondary"
            >
              Search
            </button>
          </form>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
